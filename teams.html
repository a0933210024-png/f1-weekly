  <style>
    .team-legend {
      max-width: var(--w);
      margin: 0 auto;
      padding: 18px var(--gutter);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .team-legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-2);
      transition: color var(--ease);
      cursor: pointer;
      text-decoration: none;
    }
    .team-legend-item:hover { color: #fff; }
    .tli-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* New team badge */
    .team-new-badge {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--red);
      color: #fff;
      padding: 2px 6px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* Engine badge */
    .engine-badge {
      display: inline-flex;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--border-2);
      color: var(--text-3);
      margin-top: 8px;
    }

    /* Grid stat strip */
    .grid-stats-strip {
      max-width: var(--w);
      margin: 0 auto;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .gss-item {
      background: var(--bg-2);
      padding: 18px 24px;
    }
    .gss-val {
      font-family: var(--font-display);
      font-size: 34px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }
    .gss-lbl {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-top: 4px;
    }
    @media (max-width: 600px) { .grid-stats-strip { grid-template-columns: 1fr 1fr; } }
  </style>
</head>

  <script>
    /* New teams in 2026 */
    var newTeams = { audi: true, cadillac: true };

    var engineMap = {
      mclaren: 'Mercedes', ferrari: 'Ferrari', redbull: 'Red Bull Ford',
      mercedes: 'Mercedes', astonmartin: 'Honda', alpine: 'Mercedes',
      haas: 'Ferrari', williams: 'Mercedes', racingbulls: 'Red Bull Ford',
      audi: 'Audi', cadillac: 'Ferrari'
    };

    function renderTeamsPage() {
      var l = getLang();

      /* Stats labels */
      var statLabels = {
        en: { constructors: 'Constructors', drivers: 'Drivers', engines: 'Engine Suppliers', newTeams: 'New Teams in 2026' },
        zh: { constructors: '參賽車隊', drivers: '車手', engines: '動力單元供應商', newTeams: '2026年新加入車隊' }
      };
      var labels = statLabels[l] || statLabels.en;
      document.getElementById('gss-constructors').textContent = labels.constructors;
      document.getElementById('gss-drivers').textContent      = labels.drivers;
      document.getElementById('gss-engines').textContent      = labels.engines;
      document.getElementById('gss-new').textContent          = labels.newTeams;

      /* Legend */
      var legend = document.getElementById('team-legend');
      legend.innerHTML = '';
      F1.teams.forEach(function(team) {
        var a = document.createElement('a');
        a.href = '#team-' + team.id;
        a.className = 'team-legend-item';
        a.innerHTML =
          '<span class="tli-dot" style="background:' + team.color + '"></span>' +
          '<span>' + (l === 'zh' ? team.nameZH : team.name) + '</span>' +
          (newTeams[team.id] ? '<span class="team-new-badge">NEW</span>' : '');
        legend.appendChild(a);
      });

      /* Teams grid */
      var grid = document.getElementById('teams-grid');
      grid.innerHTML = '';
      F1.teams.forEach(function(team) {
        var isNew = !!newTeams[team.id];

        var driverCards = team.drivers.map(function(d) {
          var imgUrl = d.code ? F1.getDriverImg(d.code, team.cdnSlug, 440) : '';
          return '<div class="driver-tile">' +
            '<div class="driver-tile-accent" style="background:' + team.color + '"></div>' +
            '<div class="driver-tile-num">' + d.num + '</div>' +
            (imgUrl ? '<img class="driver-tile-img" src="' + imgUrl + '" alt="' + d.first + ' ' + d.last + '" loading="lazy" onerror="this.style.display=\'none\'">' : '') +
            '<div class="driver-tile-name">' +
              '<span class="driver-tile-firstname">' + d.first + '</span>' +
              '<span class="driver-tile-lastname">' + d.last + '</span>' +
            '</div>' +
            '<div class="driver-tile-nat">' + d.flag + '&nbsp;&nbsp;' + d.nat + '</div>' +
            '<div class="driver-tile-pts">#' + d.num + '</div>' +
            '</div>';
        }).join('');

        var card = document.createElement('div');
        card.id = 'team-' + team.id;
        card.className = 'team-card';
        card.style.borderLeftColor = team.color;

        var logoUrl = team.cdnSlug ? F1.getTeamLogo(team.cdnSlug, 48) : '';

        card.innerHTML =
          '<div class="team-card-top">' +
            '<div class="team-name-block">' +
              '<div class="team-header-row">' +
                (logoUrl ? '<img class="team-logo" src="' + logoUrl + '" alt="' + team.name + '" loading="lazy" onerror="this.style.display=\'none\'">' : '') +
                '<div class="team-name">' +
                  (l === 'zh' ? team.nameZH : team.name) +
                  (isNew ? '<span class="team-new-badge">NEW</span>' : '') +
                '</div>' +
              '</div>' +
              '<div class="team-fullname">' + team.fullName + '</div>' +
              '<div class="engine-badge">' + (l === 'zh' ? '動力單元：' : 'Power Unit: ') + (engineMap[team.id] || '—') + '</div>' +
            '</div>' +
            '<div class="team-meta">' +
              '<div class="team-pos-label">P' + team.pos + '</div>' +
              '<div class="team-pts">' + team.pts + '</div>' +
              '<div class="team-pts-lbl">PTS</div>' +
            '</div>' +
          '</div>' +
          '<div class="team-drivers">' + driverCards + '</div>';

        grid.appendChild(card);
      });
    }

    /* Override main.js renderTeams so lang toggle re-renders correctly */
    window.renderTeams = renderTeamsPage;

    document.addEventListener('DOMContentLoaded', renderTeamsPage);
    document.addEventListener('f1live:updated',   renderTeamsPage);
  </script>
